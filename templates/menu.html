<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogos com Inteligência Artificial</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #ffffff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
.container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
}
h1 { 
    font-size: 36px; 
    margin-bottom: 40px; 
    font-weight: 600;
    letter-spacing: 1px;
}
button {
    display: block;
    width: 100%;
    max-width: 300px;
    padding: 18px;
    margin: 20px auto;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
    color: #0b1f38;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}
button:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}
</style>
</head>
<body>
    <div class="container">
        <h1>Jogos com Inteligência Artificial</h1>
        <button onclick="window.location.href='/robo'">Jogo do Robô Inteligente</button>
        <button onclick="window.location.href='/velha'">Jogo da Velha</button>
    </div>
</body>
</html>
