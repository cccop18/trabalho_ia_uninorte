<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha vs IA</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #ffffff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
}
h1 { margin-top: 0; font-weight: 600; }
#board {
    display: grid; 
    grid-template-columns: repeat(3, 110px); 
    gap: 12px;
    justify-content: center; 
    margin: 30px auto;
    background: rgba(0, 0, 0, 0.2);
    padding: 15px;
    border-radius: 15px;
}
.cell {
    width: 110px; 
    height: 110px; 
    background: #ffffff; 
    display: flex;
    align-items: center; 
    justify-content: center; 
    font-size: 60px;
    font-weight: bold; 
    color: #2c3e50; 
    cursor: pointer;
    border-radius: 12px; 
    transition: all 0.2s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.cell:hover { 
    transform: scale(1.05); 
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}
.controls { 
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
}
button, select {
    padding: 12px 20px; 
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
    color: #0b1f38;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    outline: none;
}
button:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 6px 20px rgba(0,0,0,0.3); 
}
select { background: #ffffff; color: #333333; }
.turn-indicator {
    margin-bottom: 20px;
    font-size: 18px;
    color: #e0e0e0;
}
</style>
</head>
<body>

<div class="container">
    <h1>Jogo da Velha</h1>
    
    <div class="controls">
        <label>Dificuldade: </label>
        <select id="dificuldade" onchange="reset()">
            <option value="facil">Fácil</option>
            <option value="medio">Médio</option>
            <option value="dificil">Difícil (Imbatível)</option>
        </select>
    </div>

    <div id="board"></div>

    <div class="controls">
        <button onclick="reset()">Reiniciar Jogo</button>
        <button onclick="window.location.href='/'">Voltar ao Menu</button>
    </div>
</div>

<script src="/static/velha.js"></script>
</body>
</html>
